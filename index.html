<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <title>Seal OS</title>
        <link rel="icon" type="image/x-icon" href="./imgs/icon.png">
        
        <link rel="stylesheet" type="text/css" href="./css/style.css">
        <link rel="stylesheet" type="text/css" href="./css/navbar.css">
        <link rel="stylesheet" type="text/css" href="./css/window.css">
        <link rel="stylesheet" type="text/css" href="./css/sealclicker.css">
        <link rel="stylesheet" type="text/css" href="./css/water.css">
    </head>
    <body id="body">
        <!-- NAVIGATION BAR -->
        <div class="navbar" id="top">
            <div class="element" style="width: 20%; justify-content: left;">
                <img class="companion-seal" src="./imgs/NormalSeal/Closed_Idle.png">
            </div>

            <div class="taskbar" style="width: 60%; justify-content: center;">
                <div class="element" id="welcome_taskbar">
                    <img src="./imgs/AppIcons/AboutMe.png">
                    <div class="taskbar_ontop" id="welcome_ontop"></div>
                </div>
                <div class="element" id="sealclicker_taskbar", style="display: none;">
                    <img src="./imgs/AppIcons/PANKETO.png">
                    <div class="taskbar_ontop" id="sealclicker_ontop"></div>
                </div>
            </div>

            <div class="element" style="width: 20%; justify-content: right;">
                <p id="timeElement" class="clock-text">
                    00/00/00, 00:00:00
                </p>
            </div>
        </div>

        <div id="desktopApps" style="padding-top: 64px; padding-left: 16px;">
            <div id="welcome_open" class="desktop_app_icon">
                <img src="./imgs/AppIcons/AboutMe.png">
                <p>Welcome</p>
            </div>
            <div id="sealclicker_open" class="desktop_app_icon">
                <img src="./imgs/AppIcons/PANKETO.png">
                <p>Seal Clicker</p>
            </div>
        </div>

        <!-- DRAGGABLE WINDOW -->
        <div id="welcome" class="windows" style="display: none;">
            <div class="windows_header" id="welcome_header">
                <!-- Window/App Details -->
                <div style="display: flex; justify-content: flex-start; align-items: center;">
                    <img class="icon" src="./imgs/AppIcons/AboutMe.png">
                    <p>Welcome</p>
                </div>

                <!-- Minimize/Close -->
                <div style="display: flex; justify-content: flex-end; align-items: center;">
                    <button class="minimize-button" id="welcome_minimize">-</button>
                    <button class="close-button" id="welcome_close">X</button>
                </div>
            </div>

            <!-- Window Insides -->
            <div class="windows_header window_body body_element">
                <p>Hello there!</p>
                <p>Welcome to <b>Seal OS</b>!</p>
                <p>Wanna try some fun stuff? Go to the Seal Clicker App!</p>
                <a style="text-decoration: none;" href="https://github.com/IndieSeal">
                    <div class="socials">
                        <!-- Recently learned you can do this in Hack Club's summer camp :D -->
                        <img src="https://cdn-icons-png.flaticon.com/512/25/25231.png">
                        <p>GitHub</p>
                    </div>
                </a>
                <a style="text-decoration: none;" href="https://indie-seal.itch.io/">
                    <div class="socials">
                        <img src="https://img.icons8.com/ios11/600/FA5252/itch-io.png">
                        <p>itch.io</p>
                    </div>
                </a>
            </div>
        </div>

        <div id="sealclicker" class="windows" style="display: none; top:11vh;">
            <div class="windows_header" id="sealclicker_header">
                <!-- Window/App Details -->
                <div style="display: flex; justify-content: flex-start; align-items: center;">
                    <img class="icon" src="./imgs/AppIcons/PANKETO.png">
                    <p>Seal Clicker</p>
                </div>

                <!-- Minimize/Close -->
                <div style="display: flex; justify-content: flex-end; align-items: center;">
                    <button class="minimize-button" id="sealclicker_minimize">-</button>
                    <button class="close-button" id="sealclicker_close">X</button>
                </div>
            </div>

            <div class="windows_header window_body" style="height: 83vh;">
                <div class="row" style="width: 100%; height: 100%;">
                    <div style="display: flex; min-width: 30%; width: 30%; height: 100%; flex-direction: column;">
                        <div style="width: 100%; margin-top: 10%; background-color: gray;">
                            <h1 id="sealclicker-score" style="text-align: center;">Points: 0</h1>
                            <h4 id="sealclicker-score_persecond" style="text-align: center;">per second: 0</h4>
                        </div>
                        <img class="sealdisplay" src="./imgs/SealClicker/Seal1.jpg" id="sealclicker-sealdisplay" style="justify-self: center; align-self: center; margin: auto 0;">
                    </div>
                    
                    <div class="vertical_separator"> </div>

                    <div class="scrollable_area" id="upgrade-visual-rows" style="flex-grow: 1; height: 100%; justify-content: flex-start; flex-direction: column; display: flex;">
                        <!-- Content added through 'sealclicker.js' -->
                    </div>

                    <div class="vertical_separator"> </div>

                    <div class="column scrollable_area" style="min-width: 320px; width: 320px; height: 100%; justify-content: flex-start; align-items: center;">   
                        <p class="store">Store</p>

                        <div class="horizontal_separator"> </div>

                        <div class="general_upgrades" id="general_upgrades">
                            <!-- Content added through 'sealclicker.js' -->
                        </div>
                        
                        <div class="horizontal_separator"> </div>

                        <div style="display: flex; flex-direction: column;" id="autoclicker_upgrades">
                            <!-- Content added through 'sealclicker.js' -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="tooltip" id="sealclicker-tooltip">
            <div class="row" style="width: 100%; height: 75px; align-items: flex-start;">
                <div class="column" style="width: 80%; height: 100%; align-items: flex-start;">
                    <h1 style="margin: 0; width: 100%; height: 50%;" id="item-name">My item name</h1>
                    <div class="row" style="margin: 0; justify-content: flex-start; width: 100%; height: 20px;">
                        <img class="small_icon" src="./imgs/SealClicker/Food.png">
                        <p class="autoclicker_cost" id="item-cost">0</p>
                    </div>
                </div>
                <img style="object-fit: contain; width: 20%; height: 100%;" id="item-icon">
            </div>
            <p style="margin: 0; text-align: left; flex-grow: 1;" id="item-description">my tooltip description</p>
            <p style="margin-top: 5px; text-align: left; flex-grow: 1;" id="item-extra"></p>
        </div>

        <div class="waves">
            <div class="wave" id="wave1"></div>
            <div class="wave" id="wave2"></div>
            <div class="wave" id="wave3"></div>
            <div class="wave" id="wave4"></div>
            <div class="fish">
                <img src="./imgs/fish.png">
            </div>
        </div>

        <!-- Appreciate the help w3schools, they're the goats https://www.w3schools.com/html/html5_audio.asp -->
        <audio id="hoverAudio"> <source src="./sounds/beep.wav" type="audio/wav"> </audio>
        <audio id="selectAudio"> <source src="./sounds/select.wav" type="audio/wav"> </audio>
        <audio id="dragAudio"> <source src="./sounds/drag.wav" type="audio/wav"> </audio>
        <audio id="seaBackground"> <source src="./sounds/SeaBackground.wav" type="audio/wav"> </audio>

        <!-- Apply Scripts -->
        <script type="module" src="./scripts/audio.js"></script>
        <script type="module" src="./scripts/drag.js"></script>
        
        <script type="module" src="./scripts/mathf.js"></script>
        
        <script type="module" src="./scripts/time.js"></script>
        <script type="module" src="./scripts/window_global.js"></script>
        <script type="module" src="./scripts/window_manager.js"></script>
        <script type="module" src="./scripts/sealclicker.js"></script>

    </body>
</html>
